<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebXR Lithium Atom - Fixed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background-color: transparent; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let scene, camera, renderer;
        let electrons = [];
        let atomGroup;

        const init = () => {
            // 1. Создаем сцену
            scene = new THREE.Scene();

            // 2. Настраиваем камеру
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // 3. Рендерер с жесткими параметрами для мобильного AR
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Ограничиваем для производительности телефона
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; // Принудительный запуск XR-модуля
            document.body.appendChild(renderer.domElement);

            // 4. Добавляем кнопку AR с явным указанием необходимых функций (features)
            // Это заставляет браузер жестко запросить у системы доступ к камере реального мира
            const arButton = ARButton.createButton(renderer, {
                requiredFeatures: ['local-floor'] 
            });
            document.body.appendChild(arButton);

            // Освещение сцены
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1.5);
            scene.add(light);

            // Создаем группу для атома
            atomGroup = new THREE.Group();
            atomGroup.scale.set(0.12, 0.12, 0.12); // Чуть уменьшили, чтобы модель гарантированно влезла в экран
            
            /* ВАЖНОЕ ИЗМЕНЕНИЕ: В WebXR точка (0,0,0) — это место, где физически лежит телефон в момент нажатия кнопки.
               Мы вешаем атом чуть выше уровня груди (y: 0.2) и отодвигаем на 1.2 метра вперед (z: -1.2).
            */
            atomGroup.position.set(0, 0.2, -1.2); 
            scene.add(atomGroup);

            // Ядро атома (Стандартный материал)
            const coreGeom = new THREE.SphereGeometry(0.7, 32, 32);
            const coreMat = new THREE.MeshStandardMaterial({
                color: 0x4444ff,
                emissive: 0x111133,
                roughness: 0.3,
                metalness: 0.2
            });
            const core = new THREE.Mesh(coreGeom, coreMat);
            atomGroup.add(core);

            // Функция для создания электронных систем
            const createElectronSystem = (color, tiltZ, speed) => {
                const tiltGroup = new THREE.Group();
                tiltGroup.rotation.z = tiltZ;

                const ellipseContainer = new THREE.Group();
                ellipseContainer.scale.set(0.38, 1, 1); 
                tiltGroup.add(ellipseContainer);

                const torusGeom = new THREE.TorusGeometry(5, 0.03, 16, 100);
                const torusMat = new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.5 });
                const torus = new THREE.Mesh(torusGeom, torusMat);
                ellipseContainer.add(torus);

                const electronPivot = new THREE.Group();
                ellipseContainer.add(electronPivot);

                const elGeom = new THREE.SphereGeometry(0.25, 16, 16);
                const elMat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.6 });
                const electron = new THREE.Mesh(elGeom, elMat);
                electron.position.set(5, 0, 0); 
                electronPivot.add(electron);

                atomGroup.add(tiltGroup);

                return { pivot: electronPivot, speed: speed };
            };

            // Создаем электроны
            electrons = [
                createElectronSystem(0xff0000, 0, 0.02),                   
                createElectronSystem(0x0000ff, Math.PI / 3, 0.015),        
                createElectronSystem(0x00ff00, (Math.PI * 2) / 3, 0.01)    
            ];

            window.addEventListener('resize', onWindowResize);

            // Запускаем цикл рендеринга
            renderer.setAnimationLoop(animate);
        };

        const onWindowResize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };

        const animate = (timestamp, frame) => {
            // Вращение электронов
            electrons.forEach(el => {
                el.pivot.rotation.z += el.speed;
            });

            // Плавное медленное вращение самого ядра для динамики в AR
            if (atomGroup) {
                atomGroup.rotation.y += 0.005;
            }

            // Рендерим кадр
            renderer.render(scene, camera);
        };

        init();
    </script>
</body>
</html>
